databases:
  - name: scq-db
    databaseName: scq
    user: scq_user
    plan: free

services:
  - type: web
    name: scq-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scq-db
          property: connectionString
      - key: JWT_SECRET
        value: scq-verdelandia-jwt-secret-2024-secure
      - key: PORT
        value: 10000
